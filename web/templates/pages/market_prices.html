{{template "layout_head" .}}
{{template "app_layout" .}}
<div class="max-w-5xl mx-auto p-4 md:p-8">
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <a href="/assistant" class="p-2 hover:bg-[#F5F7F5] rounded-lg transition-colors">
        <i data-lucide="arrow-left" class="w-5 h-5 text-[#6B7280]"></i>
      </a>
      <div class="w-10 h-10 rounded-xl bg-[#2E7D32] flex items-center justify-center">
        <i data-lucide="shopping-bag" class="w-5 h-5 text-white"></i>
      </div>
      <div>
        <h1 class="text-xl font-bold text-[#1F2937]">Market Prices</h1>
        <p class="text-sm text-[#6B7280]">Current commodity prices across Sierra Leone</p>
      </div>
    </div>
    <div id="add-price-btn-container" class="hidden">
      <button onclick="showAddPriceForm()" class="bg-[#2E7D32] hover:bg-[#245F27] text-white px-4 py-2 rounded-xl text-sm font-medium transition-colors">
        <i data-lucide="plus" class="w-4 h-4 inline-block mr-1"></i>Add Price
      </button>
    </div>
  </div>

  <div class="bg-white rounded-xl border border-[#E5E7EB] p-4 mb-6">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
      <select id="filter-commodity" class="w-full border border-[#D1D5DB] rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-[#2E7D32]/20 focus:border-[#2E7D32] outline-none">
        <option value="">All Commodities</option>
        {{range .Commodities}}
        <option value="{{.}}">{{.}}</option>
        {{end}}
      </select>
      <select id="filter-district" class="w-full border border-[#D1D5DB] rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-[#2E7D32]/20 focus:border-[#2E7D32] outline-none">
        <option value="">All Districts</option>
        {{range .Districts}}
        <option value="{{.}}">{{.}}</option>
        {{end}}
      </select>
      <button onclick="applyFilters()" class="bg-[#2E7D32] hover:bg-[#245F27] text-white px-4 py-2 rounded-xl text-sm font-medium transition-colors flex items-center justify-center gap-1">
        <i data-lucide="filter" class="w-4 h-4"></i>
        <span>Filter</span>
      </button>
    </div>
  </div>

  <div id="price-list">
    <div class="text-center py-12 text-[#6B7280]">
      <div class="w-6 h-6 border-2 border-[#2E7D32] border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
      <p>Loading prices...</p>
    </div>
  </div>

  <div id="pagination" class="flex justify-center gap-2 mt-6 hidden">
    <button id="prev-page" class="px-3 py-1.5 text-sm border rounded-lg hover:bg-[#F5F7F5] disabled:opacity-40 disabled:cursor-not-allowed">Previous</button>
    <span id="page-info" class="px-3 py-1.5 text-sm text-[#6B7280]"></span>
    <button id="next-page" class="px-3 py-1.5 text-sm border rounded-lg hover:bg-[#F5F7F5] disabled:opacity-40 disabled:cursor-not-allowed">Next</button>
  </div>

  <p class="text-center text-xs text-[#6B7280] mt-6">Demonstration market data for MVP testing.</p>
</div>

<div id="add-price-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden p-4">
  <div class="bg-white rounded-2xl p-6 w-full max-w-md max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-semibold text-[#1F2937]">Add Market Price</h2>
      <button onclick="hideAddPriceForm()" class="p-1 hover:bg-[#F5F7F5] rounded-lg">
        <i data-lucide="x" class="w-5 h-5 text-[#6B7280]"></i>
      </button>
    </div>
    <form id="add-price-form" onsubmit="return submitPrice(event)" class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-[#374151] mb-1">Commodity</label>
        <input type="text" id="price-commodity" required class="w-full border border-[#D1D5DB] rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-[#2E7D32]/20 focus:border-[#2E7D32] outline-none" placeholder="e.g. rice">
      </div>
      <div>
        <label class="block text-sm font-medium text-[#374151] mb-1">Market Name</label>
        <input type="text" id="price-market" required class="w-full border border-[#D1D5DB] rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-[#2E7D32]/20 focus:border-[#2E7D32] outline-none" placeholder="e.g. Central Market">
      </div>
      <div>
        <label class="block text-sm font-medium text-[#374151] mb-1">District</label>
        <select id="price-district" required class="w-full border border-[#D1D5DB] rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-[#2E7D32]/20 focus:border-[#2E7D32] outline-none">
          <option value="">Select district...</option>
          {{range .Districts}}
          <option value="{{.}}">{{.}}</option>
          {{end}}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-[#374151] mb-1">Price (SLE)</label>
        <input type="number" id="price-amount" required min="0" step="0.01" class="w-full border border-[#D1D5DB] rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-[#2E7D32]/20 focus:border-[#2E7D32] outline-none" placeholder="0.00">
      </div>
      <div>
        <label class="block text-sm font-medium text-[#374151] mb-1">Unit</label>
        <input type="text" id="price-unit" required class="w-full border border-[#D1D5DB] rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-[#2E7D32]/20 focus:border-[#2E7D32] outline-none" placeholder="e.g. kg, bag, litre">
      </div>
      <div>
        <label class="block text-sm font-medium text-[#374151] mb-1">Source (optional)</label>
        <input type="text" id="price-source" class="w-full border border-[#D1D5DB] rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-[#2E7D32]/20 focus:border-[#2E7D32] outline-none" placeholder="Source name">
      </div>
      <p id="price-form-error" class="text-sm text-red-600 hidden"></p>
      <button type="submit" id="price-submit-btn" class="w-full bg-[#2E7D32] hover:bg-[#245F27] text-white rounded-xl py-2.5 text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        Submit Price
      </button>
    </form>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof lucide !== 'undefined') lucide.createIcons();
    checkUserRole();
    loadPrices(1);
  });

  let currentPage = 1;

  async function checkUserRole() {
    try {
      const res = await fetch('/api/v1/auth/me');
      if (res.status === 429) return;
      if (!res.ok) return;
      const user = await res.json();
      if (user.role === 'officer' || user.role === 'admin') {
        document.getElementById('add-price-btn-container').classList.remove('hidden');
      }
    } catch (_) {}
  }

  function getFilters() {
    return {
      commodity: document.getElementById('filter-commodity').value,
      district: document.getElementById('filter-district').value,
    };
  }

  function applyFilters() {
    currentPage = 1;
    loadPrices(1);
  }

  async function loadPrices(page) {
    const container = document.getElementById('price-list');
    container.innerHTML = '<div class="text-center py-12 text-[#6B7280]"><div class="w-6 h-6 border-2 border-[#2E7D32] border-t-transparent rounded-full animate-spin mx-auto mb-3"></div><p>Loading...</p></div>';

    try {
      const filters = getFilters();
      const params = new URLSearchParams({ page: page, page_size: 20 });
      if (filters.commodity) params.set('commodity', filters.commodity);
      if (filters.district) params.set('district', filters.district);

      const res = await fetch('/api/v1/market-prices?' + params.toString());
      if (res.status === 429) {
        container.innerHTML = '<p class="text-amber-600 text-sm py-4 text-center">Too many requests. Please wait a moment and try again.</p>';
        return;
      }
      if (!res.ok) throw new Error('Failed');
      const data = await res.json();

      if (!data.prices || data.prices.length === 0) {
        container.innerHTML = '<div class="text-center py-12 text-[#6B7280]"><i data-lucide="shopping-bag" class="w-8 h-8 mx-auto mb-3"></i><p>No prices found.</p></div>';
        document.getElementById('pagination').classList.add('hidden');
        if (typeof lucide !== 'undefined') lucide.createIcons();
        return;
      }

      container.innerHTML = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b border-[#E5E7EB] bg-[#F9FAFB]">' +
        '<th class="text-left p-3 font-medium text-[#374151]">Commodity</th>' +
        '<th class="text-left p-3 font-medium text-[#374151]">Market</th>' +
        '<th class="text-left p-3 font-medium text-[#374151]">District</th>' +
        '<th class="text-right p-3 font-medium text-[#374151]">Price (SLE)</th>' +
        '<th class="text-left p-3 font-medium text-[#374151]">Unit</th>' +
        '<th class="text-center p-3 font-medium text-[#374151]">Status</th>' +
        '<th class="text-left p-3 font-medium text-[#374151]">Date</th>' +
        '</tr></thead><tbody>' +
        data.prices.map(function(p) {
          var date = new Date(p.created_at).toLocaleDateString();
          var badge = p.is_verified
            ? '<span class="inline-flex items-center gap-1 text-xs bg-green-50 text-green-700 px-2 py-0.5 rounded-full"><i data-lucide="badge-check" class="w-3 h-3"></i>Verified</span>'
            : '<span class="text-xs bg-yellow-50 text-yellow-700 px-2 py-0.5 rounded-full">Unverified</span>';
          return '<tr class="border-b border-[#E5E7EB] hover:bg-[#F9FAFB]">' +
            '<td class="p-3 font-medium text-[#1F2937] capitalize">' + escapeHTML(p.commodity) + '</td>' +
            '<td class="p-3 text-[#4B5563]">' + escapeHTML(p.market_name) + '</td>' +
            '<td class="p-3 text-[#6B7280]">' + escapeHTML(p.district) + '</td>' +
            '<td class="p-3 text-right font-semibold text-[#1F2937]">' + Number(p.price).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</td>' +
            '<td class="p-3 text-[#6B7280]">' + escapeHTML(p.unit) + '</td>' +
            '<td class="p-3 text-center">' + badge + '</td>' +
            '<td class="p-3 text-[#6B7280] text-xs">' + date + '</td>' +
            '</tr>';
        }).join('') + '</tbody></table></div>';

      if (typeof lucide !== 'undefined') lucide.createIcons();

      var totalPages = Math.ceil(data.total / data.page_size) || 1;
      var pagination = document.getElementById('pagination');
      if (totalPages > 1) {
        pagination.classList.remove('hidden');
        document.getElementById('page-info').textContent = 'Page ' + page + ' of ' + totalPages;
        document.getElementById('prev-page').disabled = page <= 1;
        document.getElementById('next-page').disabled = page >= totalPages;
        currentPage = page;
      } else {
        pagination.classList.add('hidden');
      }
    } catch (e) {
      container.innerHTML = '<div class="text-center py-12 text-red-500"><i data-lucide="alert-circle" class="w-8 h-8 mx-auto mb-3"></i><p>Failed to load prices. Please try again.</p></div>';
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }
  }

  document.getElementById('prev-page')?.addEventListener('click', function() {
    if (currentPage > 1) loadPrices(currentPage - 1);
  });
  document.getElementById('next-page')?.addEventListener('click', function() {
    loadPrices(currentPage + 1);
  });

  function showAddPriceForm() {
    document.getElementById('add-price-modal').classList.remove('hidden');
    document.getElementById('add-price-form').reset();
    document.getElementById('price-form-error').classList.add('hidden');
  }

  function hideAddPriceForm() {
    document.getElementById('add-price-modal').classList.add('hidden');
  }

  async function submitPrice(e) {
    e.preventDefault();
    var btn = document.getElementById('price-submit-btn');
    var errEl = document.getElementById('price-form-error');
    errEl.classList.add('hidden');
    btn.disabled = true;

    try {
      var res = await fetch('/api/v1/market-prices', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          commodity: document.getElementById('price-commodity').value.trim(),
          market_name: document.getElementById('price-market').value.trim(),
          district: document.getElementById('price-district').value,
          price: parseFloat(document.getElementById('price-amount').value),
          unit: document.getElementById('price-unit').value.trim(),
          source: document.getElementById('price-source').value.trim(),
        }),
      });
      if (res.status === 429) {
        errEl.textContent = 'Too many requests. Please wait a moment and try again.';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        return;
      }
      if (!res.ok) {
        var err = await res.json();
        errEl.textContent = err.error || 'Failed to submit price';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        return;
      }
      hideAddPriceForm();
      loadPrices(1);
    } catch (e) {
      errEl.textContent = 'Network error. Please try again.';
      errEl.classList.remove('hidden');
    }
    btn.disabled = false;
  }

  function escapeHTML(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js" defer></script>
{{template "layout_foot" .}}
