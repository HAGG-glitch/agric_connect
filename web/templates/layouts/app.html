<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v={{assetVersion}}">
    <link rel="alternate icon" href="/static/favicon.ico?v={{assetVersion}}">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png?v={{assetVersion}}">
    <meta name="theme-color" content="#2E7D32">
    <link rel="stylesheet" href="/static/css/app.css?v={{assetVersion}}">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="h-full bg-[#F5F7F5] text-[#1F2937] antialiased">
    {{template "content" .}}
    <script src="/static/js/app.js?v={{assetVersion}}"></script>
    <script src="/static/js/assistant.js?v={{assetVersion}}"></script>
    <script src="/static/js/recorder.js?v={{assetVersion}}"></script>
    <script src="/static/js/diagnosis.js?v={{assetVersion}}"></script>
    <script>
        if (typeof lucide !== 'undefined') lucide.createIcons();
    </script>
</body>
</html>
