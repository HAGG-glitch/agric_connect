{{template "app.html" .}}

{{define "content"}}
<div class="max-w-4xl mx-auto p-4 md:p-8">
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-[#2E7D32] flex items-center justify-center">
        <i data-lucide="clipboard-list" class="w-5 h-5 text-white"></i>
      </div>
      <div>
        <h1 class="text-xl font-bold text-[#1F2937]">Diagnosis History</h1>
        <p class="text-sm text-[#6B7280]">Your previous crop diagnoses</p>
      </div>
    </div>
    <a href="/diagnose" class="bg-[#2E7D32] hover:bg-[#245F27] text-white px-4 py-2 rounded-xl text-sm font-medium transition-colors">
      New Diagnosis
    </a>
  </div>

  <div id="diagnoses-list" class="space-y-3">
    <div class="text-center py-12 text-[#6B7280]">
      <i data-lucide="search" class="w-8 h-8 mx-auto mb-3"></i>
      <p>Loading diagnoses...</p>
    </div>
  </div>

  <div id="pagination" class="flex justify-center gap-2 mt-6 hidden">
    <button id="prev-page" class="px-3 py-1.5 text-sm border rounded-lg hover:bg-[#F5F7F5] disabled:opacity-40">Previous</button>
    <span id="page-info" class="px-3 py-1.5 text-sm text-[#6B7280]"></span>
    <button id="next-page" class="px-3 py-1.5 text-sm border rounded-lg hover:bg-[#F5F7F5] disabled:opacity-40">Next</button>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof lucide !== 'undefined') lucide.createIcons();
    loadDiagnoses(1);
  });

  let currentPage = 1;

  async function loadDiagnoses(page) {
    const container = document.getElementById('diagnoses-list');
    container.innerHTML = '<div class="text-center py-12 text-[#6B7280]"><div class="w-6 h-6 border-2 border-[#2E7D32] border-t-transparent rounded-full animate-spin mx-auto mb-3"></div><p>Loading...</p></div>';

    try {
      const res = await fetch('/api/v1/diagnoses?page=' + page + '&page_size=20');
      if (!res.ok) throw new Error('Failed');
      const data = await res.json();

      if (!data.diagnoses || data.diagnoses.length === 0) {
        container.innerHTML = '<div class="text-center py-12 text-[#6B7280]"><i data-lucide="search" class="w-8 h-8 mx-auto mb-3"></i><p>No diagnoses yet.</p><a href="/diagnose" class="text-[#2E7D32] hover:underline text-sm mt-2 inline-block">Submit your first diagnosis</a></div>';
        if (typeof lucide !== 'undefined') lucide.createIcons();
        return;
      }

      container.innerHTML = data.diagnoses.map(d => {
        const statusColors = { processing: 'text-blue-600 bg-blue-50', completed: 'text-green-600 bg-green-50', failed: 'text-red-600 bg-red-50' };
        const statusColor = statusColors[d.status] || 'text-gray-600 bg-gray-50';
        const confidence = d.confidence ? d.confidence.toFixed(0) + '%' : 'N/A';
        const date = new Date(d.created_at).toLocaleDateString();

        return '<div class="bg-white border border-[#E5E7EB] rounded-xl p-4 hover:border-[#2E7D32]/30 transition-colors">' +
          '<div class="flex items-start justify-between">' +
          '<div class="flex-1 cursor-pointer" onclick="window.location=\'/diagnoses/' + d.id + '\'">' +
          '<div class="flex items-center gap-2 mb-1">' +
          '<span class="font-semibold text-[#1F2937] capitalize">' + escapeHTML(d.crop) + '</span>' +
          '<span class="text-xs ' + statusColor + ' px-2 py-0.5 rounded-full">' + d.status + '</span>' +
          '</div>' +
          '<p class="text-sm text-[#6B7280]">' + (d.probable_condition || 'Awaiting analysis...') + '</p>' +
          '<div class="flex gap-3 mt-2 text-xs text-[#6B7280]">' +
          '<span>Confidence: ' + confidence + '</span>' +
          '<span>Urgency: ' + (d.urgency || 'N/A') + '</span>' +
          '<span>' + date + '</span>' +
          '</div>' +
          '</div>' +
          '<button onclick="deleteDiagnosis(event,\'' + d.id + '\')" class="p-1.5 text-[#6B7280] hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors flex-shrink-0">' +
          '<i data-lucide="trash-2" class="w-4 h-4"></i>' +
          '</button>' +
          '</div>' +
          '</div>';
      }).join('');

      if (typeof lucide !== 'undefined') lucide.createIcons();

      const totalPages = Math.ceil(data.total / data.page_size) || 1;
      const pagination = document.getElementById('pagination');
      if (totalPages > 1) {
        pagination.classList.remove('hidden');
        document.getElementById('page-info').textContent = 'Page ' + page + ' of ' + totalPages;
        document.getElementById('prev-page').disabled = page <= 1;
        document.getElementById('next-page').disabled = page >= totalPages;
        currentPage = page;
      } else {
        pagination.classList.add('hidden');
      }
    } catch (e) {
      container.innerHTML = '<div class="text-center py-12 text-red-500"><p>Failed to load diagnoses.</p></div>';
    }
  }

  document.getElementById('prev-page')?.addEventListener('click', function() {
    if (currentPage > 1) loadDiagnoses(currentPage - 1);
  });
  document.getElementById('next-page')?.addEventListener('click', function() {
    loadDiagnoses(currentPage + 1);
  });

  async function deleteDiagnosis(event, id) {
    event.stopPropagation();
    if (!confirm('Delete this diagnosis?')) return;
    try {
      const res = await fetch('/api/v1/diagnoses/' + id, { method: 'DELETE' });
      if (!res.ok) throw new Error('Delete failed');
      loadDiagnoses(currentPage);
    } catch (e) {
      alert('Failed to delete diagnosis.');
    }
  }

  function escapeHTML(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
{{end}}
