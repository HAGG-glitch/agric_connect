{{define "voice_recorder"}}
<div id="voice-recorder-container"></div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof Recorder !== 'undefined' && !document.getElementById('voice-recorder-container').hasAttribute('data-initialized')) {
      document.getElementById('voice-recorder-container').setAttribute('data-initialized', 'true');
      Recorder.init({
        containerId: 'voice-recorder-container',
        language: typeof State !== 'undefined' && State.language ? State.language : 'english',
      });
    }
  });
</script>
{{end}}
