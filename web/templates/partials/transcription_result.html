{{define "transcription_result"}}
<div id="transcription-result" class="hidden mt-2 bg-[#F5F7F5] border border-[#E5E7EB] rounded-xl p-3">
  <div class="flex items-center justify-between mb-2">
    <span class="text-xs font-semibold text-[#6B7280] uppercase tracking-wide">Transcription</span>
    <button type="button" id="dismiss-transcription"
      class="text-xs text-[#6B7280] hover:text-[#1F2937] transition-colors">Dismiss</button>
  </div>
  <p id="transcription-text" class="text-sm text-[#1F2937] mb-2"></p>
  {{if .ExperimentalKrio}}
  <div class="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-2 py-1.5 mb-2">
    <i data-lucide="alert-triangle" class="w-3 h-3 inline mr-1"></i>
    Krio voice transcription is experimental. Please review and correct before sending.
  </div>
  {{end}}
  <div class="flex gap-2">
    <button type="button" id="use-transcription"
      class="bg-[#2E7D32] text-white rounded-lg px-3 py-1.5 text-xs font-medium hover:bg-[#245F27] transition-colors">
      Use in Chat
    </button>
    <button type="button" id="retry-transcription"
      class="border border-[#E5E7EB] rounded-lg px-3 py-1.5 text-xs text-[#6B7280] hover:bg-white transition-colors">
      Re-record
    </button>
  </div>
</div>
{{end}}
