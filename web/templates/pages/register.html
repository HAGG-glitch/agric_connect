{{template "layout_head" .}}
<style>
  .bg-texture {
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .hero-gradient {
    background: linear-gradient(135deg, rgba(21, 58, 23, 0.95) 0%, rgba(46, 125, 50, 0.88) 50%, rgba(21, 58, 23, 0.95) 100%);
  }
  .glass-card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.15);
  }
  .glass-input {
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.15);
    transition: all 0.2s ease;
  }
  .glass-input:focus {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(129, 199, 132, 0.5);
    box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.15);
  }
  .glass-input::placeholder {
    color: rgba(255, 255, 255, 0.35);
  }
  .glass-select {
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.15);
    transition: all 0.2s ease;
    color: white;
  }
  .glass-select option {
    background: #1a3d1c;
    color: white;
  }
  .glass-select:focus {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(129, 199, 132, 0.5);
    box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.15);
  }
  .fade-in-up {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.6s ease forwards;
  }
  @keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
  }
  .glow-green {
    box-shadow: 0 0 30px rgba(46, 125, 50, 0.25);
  }
  .sprout-float {
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }
</style>

<div class="min-h-screen flex flex-col">
  {{/* ── NAV ── */}}
  <nav class="fixed top-0 left-0 right-0 z-50" style="background:rgba(15,30,16,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.08);">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-[#2E7D32] to-[#4CAF50] flex items-center justify-center shadow-lg shadow-green-900/30">
          <i data-lucide="sprout" class="w-4 h-4 text-white"></i>
        </div>
        <span class="font-bold text-base text-white">AgriConnect<span class="text-[#81C784]">AI</span></span>
      </a>
      <div class="flex items-center gap-2">
        <a href="/" class="text-sm font-medium text-white/70 hover:text-white px-3 py-1.5 transition-colors flex items-center gap-1.5">
          <i data-lucide="home" class="w-3.5 h-3.5"></i> Home
        </a>
        <a href="/login" class="text-sm font-medium text-white/70 hover:text-white px-3 py-1.5 transition-colors">Sign In</a>
      </div>
    </div>
  </nav>

  <main class="flex-1 relative min-h-screen flex items-center justify-center overflow-hidden py-20">
    {{/* ── Background ── */}}
    <div class="absolute inset-0">
      <img src="https://images.unsplash.com/photo-1593113598332-cd59a0c3a9a1?w=1600&q=80" alt="Sierra Leone farmland" class="w-full h-full object-cover" loading="lazy">
      <div class="absolute inset-0 hero-gradient"></div>
      <div class="absolute inset-0 bg-texture"></div>
    </div>

    {{/* ── Floating decoration ── */}}
    <div class="absolute top-20 left-10 w-32 h-32 rounded-full bg-[#2E7D32]/20 blur-3xl"></div>
    <div class="absolute bottom-20 right-10 w-40 h-40 rounded-full bg-[#4CAF50]/15 blur-3xl"></div>

    {{/* ── Register Card ── */}}
    <div class="relative z-10 w-full max-w-md px-4 fade-in-up">
      <div class="glass-card rounded-2xl p-8">
        <div class="text-center mb-6">
          <div class="sprout-float w-14 h-14 rounded-2xl bg-gradient-to-br from-[#2E7D32] to-[#66BB6A] flex items-center justify-center mx-auto mb-4 shadow-xl shadow-green-900/30">
            <i data-lucide="sprout" class="w-7 h-7 text-white"></i>
          </div>
          <h1 class="text-xl font-bold text-white">Create Account</h1>
          <p class="text-white/60 text-sm mt-1">Join AgriConnect AI</p>
        </div>

        <form id="register-form" onsubmit="return handleRegister(event)">
          <div class="mb-4">
            <label class="block text-sm font-medium text-white/80 mb-1.5">Full Name</label>
            <input type="text" name="full_name" required
              class="glass-input w-full px-3.5 py-2.5 rounded-xl text-sm text-white outline-none"
              placeholder="Your full name">
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-white/80 mb-1.5">Phone Number</label>
            <input type="tel" name="phone_number" required
              class="glass-input w-full px-3.5 py-2.5 rounded-xl text-sm text-white outline-none"
              placeholder="+232 XX XXX XXX">
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-white/80 mb-1.5">District</label>
            <select name="district" class="glass-select w-full px-3.5 py-2.5 rounded-xl text-sm outline-none">
              <option value="">Select district</option>
              {{range .Districts}}<option value="{{.}}">{{.}}</option>{{end}}
            </select>
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-white/80 mb-1.5">Preferred Language</label>
            <select name="preferred_language" class="glass-select w-full px-3.5 py-2.5 rounded-xl text-sm outline-none">
              <option value="english">English</option>
              <option value="krio">Krio</option>
            </select>
          </div>

          <div class="mb-5">
            <label class="block text-sm font-medium text-white/80 mb-1.5">Password</label>
            <input type="password" name="password" required minlength="6"
              class="glass-input w-full px-3.5 py-2.5 rounded-xl text-sm text-white outline-none">
            <p class="text-xs text-white/40 mt-1">At least 6 characters</p>
          </div>

          <div id="register-error" class="text-red-400 text-sm mb-3 hidden"></div>

          <button type="submit" id="register-submit" class="w-full bg-gradient-to-r from-[#2E7D32] to-[#388E3C] hover:from-[#245F27] hover:to-[#2E7D32] text-white rounded-xl py-2.5 text-sm font-medium transition-all glow-green disabled:opacity-50 disabled:cursor-not-allowed">
            <span id="register-submit-text">Create Account</span>
            <span id="register-spinner" class="hidden inline-flex items-center">
              <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Creating...
            </span>
          </button>
        </form>

        <p class="text-center text-sm text-white/50 mt-5">
          Already have an account?
          <a href="/login" class="text-[#81C784] hover:text-[#A5D6A7] font-medium transition-colors">Sign in</a>
        </p>
      </div>
    </div>
  </main>
</div>

<script>
async function handleRegister(e) {
  e.preventDefault();
  const form = e.target;
  const data = new FormData(form);
  const errEl = document.getElementById('register-error');
  const submitBtn = document.getElementById('register-submit');
  const submitText = document.getElementById('register-submit-text');
  const spinner = document.getElementById('register-spinner');
  errEl.classList.add('hidden');
  submitBtn.disabled = true;
  submitText.classList.add('hidden');
  spinner.classList.remove('hidden');

  try {
    const res = await fetch('/api/v1/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        full_name: data.get('full_name'),
        phone_number: data.get('phone_number'),
        district: data.get('district'),
        preferred_language: data.get('preferred_language'),
        password: data.get('password')
      })
    });
    if (res.status === 429) {
      errEl.textContent = 'Too many requests. Please wait a moment and try again.';
      errEl.classList.remove('hidden');
      submitBtn.disabled = false;
      submitText.classList.remove('hidden');
      spinner.classList.add('hidden');
      return;
    }
    if (!res.ok) {
      const err = await res.json();
      errEl.textContent = err.error || 'Registration failed';
      errEl.classList.remove('hidden');
      submitBtn.disabled = false;
      submitText.classList.remove('hidden');
      spinner.classList.add('hidden');
      return;
    }
    const data2 = await res.json();
    window.location.assign(data2.redirect_to || '/assistant');
  } catch (e) {
    errEl.textContent = 'Network error. Please check your connection and try again.';
    errEl.classList.remove('hidden');
    submitBtn.disabled = false;
    submitText.classList.remove('hidden');
    spinner.classList.add('hidden');
  }
}
</script>
{{template "layout_foot" .}}
