{{define "diagnosis_form"}}
<form id="diagnosis-form" class="space-y-4" enctype="multipart/form-data">
  <input type="hidden" name="preferred_language" value="english">

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-[#4B5563] mb-1">Crop *</label>
      <select id="crop" name="crop" required
        class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2.5 text-sm bg-white text-[#1F2937] focus:outline-none focus:ring-2 focus:ring-[#2E7D32]/30">
        <option value="">Select crop...</option>
        <option value="rice">Rice</option>
        <option value="cassava">Cassava</option>
        <option value="maize">Maize</option>
        <option value="groundnut">Groundnut</option>
        <option value="cocoa">Cocoa</option>
        <option value="coffee">Coffee</option>
        <option value="oil palm">Oil Palm</option>
        <option value="tomato">Tomato</option>
        <option value="pepper">Pepper</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-[#4B5563] mb-1">District</label>
      <select id="district" name="district"
        class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2.5 text-sm bg-white text-[#1F2937] focus:outline-none focus:ring-2 focus:ring-[#2E7D32]/30">
        <option value="">Select district...</option>
        {{range .Districts}}<option value="{{.}}">{{.}}</option>{{end}}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-[#4B5563] mb-1">Affected Plant Part</label>
      <select id="plant_part" name="plant_part"
        class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2.5 text-sm bg-white text-[#1F2937] focus:outline-none focus:ring-2 focus:ring-[#2E7D32]/30">
        <option value="">Select part...</option>
        {{range .PlantParts}}<option value="{{.}}">{{.}}</option>{{end}}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-[#4B5563] mb-1">Symptoms Started</label>
      <input type="date" id="symptoms_started_at" name="symptoms_started_at"
        class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2.5 text-sm bg-white text-[#1F2937] focus:outline-none focus:ring-2 focus:ring-[#2E7D32]/30">
    </div>
  </div>

  <div>
    <label class="block text-sm font-medium text-[#4B5563] mb-1">Symptom Description *</label>
    <textarea id="symptom_description" name="symptom_description" rows="3" required
      placeholder="Describe the symptoms you're seeing on your crop..."
      class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2.5 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-[#2E7D32]/30"></textarea>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div>
      <label class="block text-sm font-medium text-[#4B5563] mb-1">Affected Area (%)</label>
      <input type="number" id="affected_percentage" name="affected_percentage" min="0" max="100" step="1"
        class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2.5 text-sm bg-white text-[#1F2937] focus:outline-none focus:ring-2 focus:ring-[#2E7D32]/30">
    </div>
    <div>
      <label class="block text-sm font-medium text-[#4B5563] mb-1">Recent Weather</label>
      <input type="text" id="recent_weather" name="recent_weather"
        placeholder="e.g. heavy rain, dry spell"
        class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2.5 text-sm bg-white text-[#1F2937] focus:outline-none focus:ring-2 focus:ring-[#2E7D32]/30">
    </div>
    <div>
      <label class="block text-sm font-medium text-[#4B5563] mb-1">Fertiliser Applied?</label>
      <input type="text" id="fertiliser_history" name="fertiliser_history"
        placeholder="Type and date"
        class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2.5 text-sm bg-white text-[#1F2937] focus:outline-none focus:ring-2 focus:ring-[#2E7D32]/30">
    </div>
  </div>

  <div>
    <label class="block text-sm font-medium text-[#4B5563] mb-1">Pesticide Applied?</label>
    <input type="text" id="pesticide_history" name="pesticide_history"
      placeholder="Type and date"
      class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2.5 text-sm bg-white text-[#1F2937] focus:outline-none focus:ring-2 focus:ring-[#2E7D32]/30">
  </div>

  {{template "image_preview" .}}

  <p class="text-xs text-[#6B7280] bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
    <i data-lucide="alert-triangle" class="w-3 h-3 inline mr-1"></i>
    This is a preliminary AI assessment and may be incorrect. Confirm serious or uncertain crop problems with a qualified agricultural extension officer.
  </p>

  <button type="submit" id="submit-btn"
    class="w-full bg-[#2E7D32] hover:bg-[#245F27] text-white rounded-xl py-3 text-sm font-medium transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
    <i data-lucide="search" class="w-4 h-4 inline mr-2"></i>Submit for Analysis
  </button>
</form>
{{end}}
