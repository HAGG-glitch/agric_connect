{{template "layout_head" .}}
<div class="max-w-5xl mx-auto p-4 md:p-8">
  <h1 class="text-2xl font-bold text-[#1F2937] mb-6">Admin Dashboard</h1>

  <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
    <div class="bg-white rounded-xl border border-[#E5E7EB] p-4 text-center">
      <p class="text-2xl font-bold text-[#1F2937]">{{.FarmerCount}}</p>
      <p class="text-xs text-[#6B7280]">Farmers</p>
    </div>
    <div class="bg-white rounded-xl border border-[#E5E7EB] p-4 text-center">
      <p class="text-2xl font-bold text-[#1F2937]">{{.OfficerCount}}</p>
      <p class="text-xs text-[#6B7280]">Officers</p>
    </div>
    <div class="bg-white rounded-xl border border-[#E5E7EB] p-4 text-center">
      <p class="text-2xl font-bold text-[#1F2937]">{{.AdminCount}}</p>
      <p class="text-xs text-[#6B7280]">Admins</p>
    </div>
    <div class="bg-white rounded-xl border border-[#E5E7EB] p-4 text-center">
      <p class="text-2xl font-bold text-[#1F2937]">{{.DiagnosisCount}}</p>
      <p class="text-xs text-[#6B7280]">Diagnoses</p>
    </div>
    <div class="bg-white rounded-xl border border-[#E5E7EB] p-4 text-center">
      <p class="text-2xl font-bold text-[#1F2937]">{{.PendingReviews}}</p>
      <p class="text-xs text-[#6B7280]">Pending Reviews</p>
    </div>
  </div>

  <div class="bg-white rounded-xl border border-[#E5E7EB]">
    <div class="p-4 border-b border-[#E5E7EB]">
      <h2 class="font-semibold text-[#1F2937]">User Management</h2>
    </div>
    <div id="user-list">
      <p class="text-[#6B7280] text-sm py-8 text-center">Loading...</p>
    </div>
  </div>
</div>

<script>
async function loadUsers() {
  try {
    const res = await fetch('/api/v1/admin/users');
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();
    const container = document.getElementById('user-list');

    if (!data.users || data.users.length === 0) {
      container.innerHTML = '<p class="text-[#6B7280] text-sm py-8 text-center">No users found</p>';
      return;
    }

    container.innerHTML = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b border-[#E5E7EB] bg-[#F9FAFB]"><th class="text-left p-3 font-medium">Name</th><th class="text-left p-3 font-medium">Phone</th><th class="text-left p-3 font-medium">District</th><th class="text-left p-3 font-medium">Role</th><th class="text-left p-3 font-medium">Status</th><th class="text-left p-3 font-medium">Actions</th></tr></thead><tbody>' +
      data.users.map(u => `
        <tr class="border-b border-[#E5E7EB] hover:bg-[#F9FAFB]" data-user-id="${u.id}">
          <td class="p-3">${u.full_name}</td>
          <td class="p-3 text-[#6B7280]">${u.phone_number}</td>
          <td class="p-3 text-[#6B7280]">${u.district || '-'}</td>
          <td class="p-3">
            <select class="text-xs border border-[#D1D5DB] rounded px-2 py-1" onchange="updateRole('${u.id}', this.value)">
              <option value="farmer" ${u.role === 'farmer' ? 'selected' : ''}>Farmer</option>
              <option value="officer" ${u.role === 'officer' ? 'selected' : ''}>Officer</option>
              <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
            </select>
          </td>
          <td class="p-3">
            <span class="text-xs px-2 py-1 rounded-full ${u.is_active ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}">${u.is_active ? 'Active' : 'Inactive'}</span>
          </td>
          <td class="p-3">
            <button onclick="toggleStatus('${u.id}', ${!u.is_active})" class="text-xs px-2 py-1 border rounded hover:bg-[#F5F7F5]">
              ${u.is_active ? 'Deactivate' : 'Activate'}
            </button>
          </td>
        </tr>
      `).join('') + '</tbody></table></div>';
  } catch (e) {
    document.getElementById('user-list').innerHTML = '<p class="text-red-600 text-sm py-8 text-center">Failed to load users</p>';
  }
}

async function updateRole(userId, role) {
  try {
    const res = await fetch('/api/v1/admin/users/' + userId + '/role', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role })
    });
    if (!res.ok) {
      const err = await res.json();
      alert(err.error || 'Failed to update role');
    }
  } catch (e) {
    alert('Failed to update role');
  }
}

async function toggleStatus(userId, isActive) {
  try {
    const res = await fetch('/api/v1/admin/users/' + userId + '/status', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ is_active: isActive })
    });
    if (!res.ok) {
      const err = await res.json();
      alert(err.error || 'Failed to update status');
      return;
    }
    loadUsers();
  } catch (e) {
    alert('Failed to update status');
  }
}

loadUsers();
</script>
{{template "layout_foot" .}}
