{{template "layout_head" .}}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <i data-lucide="tractor" class="w-12 h-12 text-[#2E7D32] mx-auto mb-3"></i>
      <h1 class="text-2xl font-bold text-[#1F2937]">Welcome Back</h1>
      <p class="text-[#6B7280] mt-1">Sign in to your AgriConnect account</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-[#E5E7EB] p-6">
      <form id="login-form" onsubmit="return handleLogin(event)">
        <div class="mb-4">
          <label class="block text-sm font-medium text-[#374151] mb-1">Phone Number</label>
          <input type="tel" name="phone_number" required
            class="w-full px-3 py-2 border border-[#D1D5DB] rounded-xl text-sm focus:ring-2 focus:ring-[#2E7D32]/20 focus:border-[#2E7D32] outline-none"
            placeholder="+232 XX XXX XXX">
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-[#374151] mb-1">Password</label>
          <input type="password" name="password" required
            class="w-full px-3 py-2 border border-[#D1D5DB] rounded-xl text-sm focus:ring-2 focus:ring-[#2E7D32]/20 focus:border-[#2E7D32] outline-none">
        </div>

        <div id="login-error" class="text-red-600 text-sm mb-3 hidden"></div>

        <button type="submit" id="login-submit" class="w-full bg-[#2E7D32] hover:bg-[#245F27] text-white rounded-xl py-2.5 text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          <span id="login-submit-text">Sign In</span>
          <span id="login-spinner" class="hidden inline-flex items-center">
            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Signing In...
          </span>
        </button>
      </form>

      <p class="text-center text-sm text-[#6B7280] mt-4">
        Don't have an account? <a href="/register" class="text-[#2E7D32] hover:underline font-medium">Register</a>
      </p>
    </div>
  </div>
</div>

<script>
async function handleLogin(e) {
  e.preventDefault();
  const form = e.target;
  const data = new FormData(form);
  const errEl = document.getElementById('login-error');
  const submitBtn = document.getElementById('login-submit');
  const submitText = document.getElementById('login-submit-text');
  const spinner = document.getElementById('login-spinner');
  errEl.classList.add('hidden');
  submitBtn.disabled = true;
  submitText.classList.add('hidden');
  spinner.classList.remove('hidden');

  try {
    const res = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        phone_number: data.get('phone_number'),
        password: data.get('password')
      })
    });
    if (res.status === 429) {
      errEl.textContent = 'Too many requests. Please wait a moment and try again.';
      errEl.classList.remove('hidden');
      submitBtn.disabled = false;
      submitText.classList.remove('hidden');
      spinner.classList.add('hidden');
      return;
    }
    if (!res.ok) {
      const err = await res.json();
      errEl.textContent = err.error || 'Login failed';
      errEl.classList.remove('hidden');
      submitBtn.disabled = false;
      submitText.classList.remove('hidden');
      spinner.classList.add('hidden');
      return;
    }
    const data2 = await res.json();
    window.location.assign(data2.redirect_to || '/assistant');
  } catch (e) {
    errEl.textContent = 'Network error. Please check your connection and try again.';
    errEl.classList.remove('hidden');
    submitBtn.disabled = false;
    submitText.classList.remove('hidden');
    spinner.classList.add('hidden');
  }
}
</script>
{{template "layout_foot" .}}
