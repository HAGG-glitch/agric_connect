{{template "layout_head" .}}
<div class="max-w-2xl mx-auto p-4 md:p-8">
  <div class="flex items-center gap-3 mb-6">
    <a href="/assistant" class="p-2 hover:bg-[#F5F7F5] rounded-lg transition-colors">
      <i data-lucide="arrow-left" class="w-5 h-5 text-[#6B7280]"></i>
    </a>
    <div class="w-10 h-10 rounded-xl bg-[#2E7D32] flex items-center justify-center">
      <i data-lucide="user" class="w-5 h-5 text-white"></i>
    </div>
    <div>
      <h1 class="text-xl font-bold text-[#1F2937]">My Profile</h1>
      <p class="text-sm text-[#6B7280">Manage your account information</p>
    </div>
  </div>

  <div id="profile-form-container">
    <div class="bg-white rounded-xl border border-[#E5E7EB] p-6 space-y-5">
      <div>
        <label class="block text-sm font-medium text-[#374151] mb-1">Full Name</label>
        <input type="text" id="input-full-name" value="{{.User.FullName}}"
          class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#2E7D32]/30">
      </div>

      <div>
        <label class="block text-sm font-medium text-[#374151] mb-1">Phone Number</label>
        <input type="text" value="{{.User.PhoneNumber}}" disabled
          class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2 text-sm bg-[#F9FAFB] text-[#6B7280] cursor-not-allowed">
        <p class="text-xs text-[#6B7280] mt-1">Phone number cannot be changed</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-[#374151] mb-1">District</label>
        <select id="input-district" class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#2E7D32]/30">
          <option value="">Select district...</option>
          {{range .Districts}}
          <option value="{{.}}" {{if eq . $.User.District}}selected{{end}}>{{.}}</option>
          {{end}}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-[#374151] mb-1">Preferred Language</label>
        <select id="input-language" class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#2E7D32]/30">
          <option value="english" {{if eq .User.PreferredLanguage "english"}}selected{{end}}>English</option>
          <option value="krio" {{if eq .User.PreferredLanguage "krio"}}selected{{end}}>Krio</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-[#374151] mb-1">Role</label>
        <input type="text" value="{{.User.Role}}" disabled
          class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2 text-sm bg-[#F9FAFB] text-[#6B7280] cursor-not-allowed capitalize">
      </div>

      <button id="save-profile-btn" onclick="saveProfile()"
        class="w-full bg-[#2E7D32] hover:bg-[#245F27] text-white rounded-xl py-2.5 font-medium transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
        Save Changes
      </button>

      <p id="profile-message" class="text-sm text-center hidden"></p>
    </div>
  </div>
</div>

<script>
  async function saveProfile() {
    const btn = document.getElementById('save-profile-btn');
    const msg = document.getElementById('profile-message');
    btn.disabled = true;
    msg.classList.add('hidden');

    const body = {};
    const fullName = document.getElementById('input-full-name').value.trim();
    const district = document.getElementById('input-district').value;
    const lang = document.getElementById('input-language').value;

    if (fullName) body.full_name = fullName;
    if (district) body.district = district;
    body.preferred_language = lang;

    try {
      const res = await fetch('/api/v1/profile/preferences', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error('Failed to save');
      msg.className = 'text-sm text-center text-green-600';
      msg.textContent = 'Profile updated successfully.';
      msg.classList.remove('hidden');
    } catch (e) {
      msg.className = 'text-sm text-center text-red-600';
      msg.textContent = 'Failed to update profile. Please try again.';
      msg.classList.remove('hidden');
    }
    btn.disabled = false;
  }
</script>
{{template "layout_foot" .}}
