{{template "layout_head" .}}
{{template "app_layout" .}}
<div class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-xl font-bold text-[#1F2937]">Diagnosis Queue</h1>
    <p class="text-sm text-[#6B7280]">Review and manage farmer diagnosis cases</p>
  </div>
</div>
<div class="section-card">
  <div class="flex items-center gap-3 mb-4 flex-wrap">
    <select id="status-filter" class="filter-select !text-xs">
      <option value="">All Status</option>
      <option value="completed">AI Completed</option>
      <option value="awaiting_review">Awaiting Review</option>
      <option value="under_review">Under Review</option>
      <option value="reviewed">Reviewed</option>
    </select>
    <select id="crop-filter" class="filter-select !text-xs">
      <option value="">All Crops</option>
      <option value="rice">Rice</option>
      <option value="cassava">Cassava</option>
      <option value="maize">Maize</option>
      <option value="groundnut">Groundnut</option>
      <option value="cocoa">Cocoa</option>
      <option value="coffee">Coffee</option>
      <option value="tomato">Tomato</option>
      <option value="pepper">Pepper</option>
      <option value="yam">Yam</option>
    </select>
    <select id="urgency-filter" class="filter-select !text-xs">
      <option value="">All Urgency</option>
      <option value="urgent">Urgent</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <button onclick="loadList()" class="btn-primary !text-xs">Apply Filters</button>
  </div>
</div>
<div class="section-card">
  <div id="diagnosis-list"><p class="text-[#6B7280] text-sm py-8 text-center">Loading...</p></div>
  <div id="pagination" class="flex items-center justify-center gap-2 mt-4"></div>
  <div id="queue-empty" class="empty-state hidden">
    <div class="empty-icon"><i data-lucide="inbox" class="w-6 h-6 text-[#6B7280]"></i></div>
    <p class="empty-title">Queue is clear</p>
    <p class="empty-desc">No diagnoses awaiting review. New cases will appear here when farmers submit them.</p>
  </div>
</div>
<script>
let currentPage = 1;

async function loadList() {
  const status = document.getElementById('status-filter').value;
  const crop = document.getElementById('crop-filter').value;
  const urgency = document.getElementById('urgency-filter').value;
  const params = new URLSearchParams({ page: currentPage, page_size: '20' });
  if (status) params.set('status', status);
  if (crop) params.set('crop', crop);
  if (urgency) params.set('urgency', urgency);

  try {
    const res = await fetch('/api/v1/officer/diagnoses?' + params);
    const container = document.getElementById('diagnosis-list');
    if (res.status === 429) {
      container.innerHTML = '<p class="text-amber-600 text-sm py-4 text-center">Too many requests. Please wait a moment and try again.</p>';
      return;
    }
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();

    if (!data.diagnoses || data.diagnoses.length === 0) {
      document.getElementById('queue-empty').classList.remove('hidden');
      container.innerHTML = '';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    document.getElementById('queue-empty').classList.add('hidden');

    container.innerHTML = data.diagnoses.map(function(d) {
      var statusClass = d.status === 'awaiting_review' ? 'bg-yellow-50 text-yellow-700' : d.status === 'under_review' ? 'bg-blue-50 text-blue-700' : d.status === 'reviewed' ? 'bg-green-50 text-green-700' : 'bg-gray-50 text-gray-700';
      var urgencyClass = d.urgency === 'urgent' ? 'bg-red-50 text-red-600' : d.urgency === 'high' ? 'bg-orange-50 text-orange-600' : 'bg-green-50 text-green-600';
      return '<a href="/officer/diagnoses/' + d.id + '" class="flex items-center justify-between py-3 px-4 border-b border-[#E5E7EB] last:border-0 hover:bg-[#F9FAFB]">' +
        '<div class="flex-1">' +
          '<div class="flex items-center gap-2">' +
            '<p class="text-sm font-medium text-[#1F2937]">' + (d.crop || '') + (d.probable_condition ? ' - ' + d.probable_condition : '') + '</p>' +
            '<span class="text-xs ' + urgencyClass + ' px-2 py-0.5 rounded-full">' + (d.urgency || 'unknown') + '</span>' +
          '</div>' +
          '<p class="text-xs text-[#6B7280] mt-0.5">' + (d.district || 'No district') + ' &middot; ' + new Date(d.created_at).toLocaleDateString() + '</p>' +
        '</div>' +
        '<span class="text-xs px-2 py-1 rounded-full ' + statusClass + '">' + d.status + '</span>' +
      '</a>';
    }).join('');

    var totalPages = Math.ceil(data.total / data.page_size) || 1;
    document.getElementById('pagination').innerHTML =
      '<button onclick="changePage(' + (currentPage - 1) + ')" class="text-sm px-3 py-1 border rounded ' + (currentPage <= 1 ? 'opacity-50 cursor-not-allowed' : '') + '" ' + (currentPage <= 1 ? 'disabled' : '') + '>Previous</button>' +
      '<span class="text-sm text-[#6B7280]">Page ' + currentPage + ' of ' + totalPages + '</span>' +
      '<button onclick="changePage(' + (currentPage + 1) + ')" class="text-sm px-3 py-1 border rounded ' + (currentPage >= totalPages ? 'opacity-50 cursor-not-allowed' : '') + '" ' + (currentPage >= totalPages ? 'disabled' : '') + '>Next</button>';
  } catch (e) {
    document.getElementById('diagnosis-list').innerHTML = '<p class="text-red-600 text-sm py-8 text-center">Failed to load</p>';
  }
}

function changePage(page) {
  if (page < 1) return;
  currentPage = page;
  loadList();
}

loadList();
</script>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js" defer></script>
{{template "layout_foot" .}}
