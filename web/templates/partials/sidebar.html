{{define "sidebar"}}
<aside id="sidebar" class="fixed lg:relative z-30 w-72 h-full bg-white border-r border-[#E5E7EB] flex flex-col transition-transform duration-200 -translate-x-full lg:translate-x-0">
  <div class="p-5 border-b border-[#E5E7EB]">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-[#2E7D32] flex items-center justify-center flex-shrink-0">
        <i data-lucide="sprout" class="w-5 h-5 text-white"></i>
      </div>
      <div>
        <h1 class="font-bold text-[#2E7D32] text-base leading-tight">AgriConnect AI</h1>
        <p class="text-xs text-[#6B7280]">Agricultural Assistant</p>
      </div>
    </div>
  </div>
  <div class="p-3 border-b border-[#E5E7EB]">
    <button onclick="startNewConversation()" class="w-full flex items-center gap-2 px-4 py-2.5 bg-[#2E7D32] hover:bg-[#245F27] text-white rounded-xl text-sm font-medium transition-colors">
      <i data-lucide="plus" class="w-4 h-4"></i>
      New Conversation
    </button>
  </div>
  <div class="p-3 space-y-3 border-b border-[#E5E7EB]">
    <div>
      <label class="block text-xs font-semibold text-[#6B7280] uppercase tracking-wide mb-1.5">Language</label>
      <div class="flex gap-2">
        <button id="lang-english" onclick="setLanguage('english')" class="lang-btn flex-1 py-1.5 text-sm rounded-lg border transition-all font-medium active-lang">English</button>
        <button id="lang-krio" onclick="setLanguage('krio')" class="lang-btn flex-1 py-1.5 text-sm rounded-lg border transition-all font-medium">Krio</button>
      </div>
    </div>
    <div>
      <label class="block text-xs font-semibold text-[#6B7280] uppercase tracking-wide mb-1.5">District</label>
      <select id="district-select" onchange="setDistrict(this.value)" class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2 text-sm bg-white text-[#1F2937] focus:outline-none focus:ring-2 focus:ring-[#2E7D32]/30">
        <option value="">Select district...</option>
        {{range .Districts}}
        <option value="{{.}}">{{.}}</option>
        {{end}}
      </select>
    </div>
    <div>
      <label class="block text-xs font-semibold text-[#6B7280] uppercase tracking-wide mb-1.5">Primary Crop</label>
      <select id="crop-select" onchange="setCrop(this.value)" class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2 text-sm bg-white text-[#1F2937] focus:outline-none focus:ring-2 focus:ring-[#2E7D32]/30">
        <option value="">Select crop...</option>
        <option value="rice">Rice</option>
        <option value="cassava">Cassava</option>
        <option value="maize">Maize</option>
        <option value="groundnut">Groundnut</option>
        <option value="yam">Yam</option>
        <option value="sweet potato">Sweet Potato</option>
        <option value="plantain">Plantain</option>
        <option value="cocoa">Cocoa</option>
        <option value="palm oil">Palm Oil</option>
        <option value="other">Other</option>
      </select>
    </div>
  </div>
  <div class="px-3 py-2 border-b border-[#E5E7EB]">
    <button onclick="fetchWeather()" id="weather-btn" class="w-full flex items-center gap-2 px-3 py-2 text-sm text-[#6B7280] hover:bg-[#F5F7F5] rounded-lg transition-colors">
      <i data-lucide="cloud-sun" class="w-4 h-4 text-[#FFC107]"></i>
      <span>Check District Weather</span>
    </button>
  </div>
  <div class="flex-1 overflow-y-auto p-2" id="conversation-list">
    <p class="text-xs font-semibold text-[#6B7280] uppercase tracking-wide px-2 py-2">Recent Conversations</p>
    <div id="conversations-container">
      <p class="text-xs text-[#6B7280] px-2 py-4 text-center">No conversations yet</p>
    </div>
  </div>
  <div class="p-3 border-t border-[#E5E7EB]">
    <p class="text-xs text-[#6B7280] text-center">Sierra Leone Agricultural Advisory</p>
  </div>
</aside>
{{end}}
