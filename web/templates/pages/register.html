{{template "app.html" .}}

{{define "content"}}
<div class="min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <i data-lucide="tractor" class="w-12 h-12 text-[#2E7D32] mx-auto mb-3"></i>
      <h1 class="text-2xl font-bold text-[#1F2937]">Create Account</h1>
      <p class="text-[#6B7280] mt-1">Join AgriConnect AI</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-[#E5E7EB] p-6">
      <form id="register-form" onsubmit="return handleRegister(event)">
        <div class="mb-4">
          <label class="block text-sm font-medium text-[#374151] mb-1">Full Name</label>
          <input type="text" name="full_name" required
            class="w-full px-3 py-2 border border-[#D1D5DB] rounded-xl text-sm focus:ring-2 focus:ring-[#2E7D32]/20 focus:border-[#2E7D32] outline-none">
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-[#374151] mb-1">Phone Number</label>
          <input type="tel" name="phone_number" required
            class="w-full px-3 py-2 border border-[#D1D5DB] rounded-xl text-sm focus:ring-2 focus:ring-[#2E7D32]/20 focus:border-[#2E7D32] outline-none"
            placeholder="+232 XX XXX XXX">
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-[#374151] mb-1">District</label>
          <select name="district" class="w-full px-3 py-2 border border-[#D1D5DB] rounded-xl text-sm focus:ring-2 focus:ring-[#2E7D32]/20 focus:border-[#2E7D32] outline-none">
            <option value="">Select district</option>
            {{range .Districts}}<option value="{{.}}">{{.}}</option>{{end}}
          </select>
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-[#374151] mb-1">Preferred Language</label>
          <select name="preferred_language" class="w-full px-3 py-2 border border-[#D1D5DB] rounded-xl text-sm focus:ring-2 focus:ring-[#2E7D32]/20 focus:border-[#2E7D32] outline-none">
            <option value="english">English</option>
            <option value="krio">Krio</option>
          </select>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-[#374151] mb-1">Password</label>
          <input type="password" name="password" required minlength="6"
            class="w-full px-3 py-2 border border-[#D1D5DB] rounded-xl text-sm focus:ring-2 focus:ring-[#2E7D32]/20 focus:border-[#2E7D32] outline-none">
          <p class="text-xs text-[#6B7280] mt-1">At least 6 characters</p>
        </div>

        <div id="register-error" class="text-red-600 text-sm mb-3 hidden"></div>

        <button type="submit" class="w-full bg-[#2E7D32] hover:bg-[#245F27] text-white rounded-xl py-2.5 text-sm font-medium transition-colors">
          Create Account
        </button>
      </form>

      <p class="text-center text-sm text-[#6B7280] mt-4">
        Already have an account? <a href="/login" class="text-[#2E7D32] hover:underline font-medium">Sign in</a>
      </p>
    </div>
  </div>
</div>

<script>
async function handleRegister(e) {
  e.preventDefault();
  const form = e.target;
  const data = new FormData(form);
  const errEl = document.getElementById('register-error');
  errEl.classList.add('hidden');

  try {
    const res = await fetch('/api/v1/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        full_name: data.get('full_name'),
        phone_number: data.get('phone_number'),
        district: data.get('district'),
        preferred_language: data.get('preferred_language'),
        password: data.get('password')
      })
    });
    if (!res.ok) {
      const err = await res.json();
      errEl.textContent = err.error || 'Registration failed';
      errEl.classList.remove('hidden');
      return;
    }
    window.location.href = '/assistant';
  } catch (e) {
    errEl.textContent = 'Network error';
    errEl.classList.remove('hidden');
  }
}
</script>
{{end}}
