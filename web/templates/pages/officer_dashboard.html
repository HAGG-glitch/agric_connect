{{template "layout_head" .}}
<div class="max-w-5xl mx-auto p-4 md:p-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-[#1F2937]">Extension Officer Dashboard</h1>
      <p class="text-[#6B7280] text-sm">Manage and review crop diagnosis cases</p>
    </div>
    <a href="/logout" class="text-sm text-[#6B7280] hover:text-red-600">Logout</a>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
    <div class="bg-white rounded-xl border border-[#E5E7EB] p-4">
      <p class="text-sm text-[#6B7280]">Pending Reviews</p>
      <p class="text-2xl font-bold text-[#1F2937]" id="pending-count">-</p>
    </div>
    <div class="bg-white rounded-xl border border-[#E5E7EB] p-4">
      <p class="text-sm text-[#6B7280]">In Review</p>
      <p class="text-2xl font-bold text-[#1F2937]" id="in-review-count">-</p>
    </div>
    <div class="bg-white rounded-xl border border-[#E5E7EB] p-4">
      <p class="text-sm text-[#6B7280]">Completed</p>
      <p class="text-2xl font-bold text-[#1F2937]" id="completed-count">-</p>
    </div>
  </div>

  <div class="bg-white rounded-xl border border-[#E5E7EB] p-4">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-semibold text-[#1F2937]">Diagnosis Queue</h2>
      <a href="/officer/diagnoses" class="text-sm text-[#2E7D32] hover:underline">View All</a>
    </div>
    <div id="queue-list">
      <p class="text-[#6B7280] text-sm py-4 text-center">Loading...</p>
    </div>
  </div>
</div>

<script>
async function loadDashboard() {
  try {
    const res = await fetch('/api/v1/officer/diagnoses?page_size=5');
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();
    const list = document.getElementById('queue-list');

    if (!data.diagnoses || data.diagnoses.length === 0) {
      list.innerHTML = '<p class="text-[#6B7280] text-sm py-4 text-center">No diagnoses awaiting review</p>';
      return;
    }

    list.innerHTML = data.diagnoses.map(d => `
      <a href="/officer/diagnoses/${d.id}" class="flex items-center justify-between py-3 border-b border-[#E5E7EB] last:border-0 hover:bg-[#F9FAFB] px-2 rounded-lg">
        <div>
          <p class="text-sm font-medium text-[#1F2937]">${d.crop} - ${d.probable_condition || 'Pending'}</p>
          <p class="text-xs text-[#6B7280]">${d.district || 'No district'} &middot; ${new Date(d.created_at).toLocaleDateString()}</p>
        </div>
        <span class="text-xs px-2 py-1 rounded-full ${d.status === 'awaiting_review' ? 'bg-yellow-50 text-yellow-700' : d.status === 'under_review' ? 'bg-blue-50 text-blue-700' : 'bg-green-50 text-green-700'}">${d.status}</span>
      </a>
    `).join('');
  } catch (e) {
    document.getElementById('queue-list').innerHTML = '<p class="text-red-600 text-sm py-4 text-center">Failed to load</p>';
  }
}

loadDashboard();
</script>
{{template "layout_foot" .}}
