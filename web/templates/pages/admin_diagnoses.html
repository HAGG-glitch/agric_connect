{{template "layout_head" .}}
{{template "app_layout" .}}
<div class="max-w-6xl mx-auto p-4 md:p-8">
  <div class="flex items-center gap-3 mb-6">
    <a href="/admin/users" class="p-2 hover:bg-[#F5F7F5] rounded-lg transition-colors">
      <i data-lucide="arrow-left" class="w-5 h-5 text-[#6B7280]"></i>
    </a>
    <div>
      <h1 class="text-xl font-bold text-[#1F2937]">All Diagnoses - Admin</h1>
      <p class="text-sm text-[#6B7280]">View all diagnoses across the platform</p>
    </div>
  </div>

  <div class="bg-white rounded-xl border border-[#E5E7EB] p-4 mb-4">
    <div class="flex flex-wrap gap-2">
      <select id="status-filter" class="text-sm border border-[#D1D5DB] rounded-lg px-3 py-1.5">
        <option value="">All Status</option>
        <option value="completed">AI Completed</option>
        <option value="awaiting_review">Awaiting Review</option>
        <option value="under_review">Under Review</option>
        <option value="reviewed">Reviewed</option>
      </select>
      <select id="crop-filter" class="text-sm border border-[#D1D5DB] rounded-lg px-3 py-1.5">
        <option value="">All Crops</option>
        <option value="rice">Rice</option>
        <option value="cassava">Cassava</option>
        <option value="maize">Maize</option>
        <option value="groundnut">Groundnut</option>
        <option value="cocoa">Cocoa</option>
        <option value="coffee">Coffee</option>
        <option value="tomato">Tomato</option>
        <option value="pepper">Pepper</option>
        <option value="yam">Yam</option>
      </select>
      <button onclick="loadList()" class="bg-[#2E7D32] text-white px-4 py-1.5 rounded-lg text-sm">Filter</button>
    </div>
  </div>

  <div class="bg-white rounded-xl border border-[#E5E7EB]">
    <div id="diagnosis-list">
      <p class="text-[#6B7280] text-sm py-8 text-center">Loading...</p>
    </div>
    <div id="pagination" class="flex items-center justify-between p-4 border-t border-[#E5E7EB]"></div>
  </div>
</div>

<script>
let currentPage = 1;

async function checkAuth() {
  try {
    const res = await fetch('/api/v1/auth/me');
    if (!res.ok) { window.location.href = '/login'; return false; }
    const data = await res.json();
    if (data.role !== 'admin') { window.location.href = '/'; return false; }
    return true;
  } catch { window.location.href = '/login'; return false; }
}

async function loadList() {
  const authed = await checkAuth();
  if (!authed) return;

  const status = document.getElementById('status-filter').value;
  const crop = document.getElementById('crop-filter').value;
  const params = new URLSearchParams({ page: currentPage, page_size: '20' });
  if (status) params.set('status', status);
  if (crop) params.set('crop', crop);

  try {
    const res = await fetch('/api/v1/admin/diagnoses?' + params);
    const container = document.getElementById('diagnosis-list');
    if (res.status === 429) {
      container.innerHTML = '<p class="text-amber-600 text-sm py-4 text-center">Too many requests. Please wait a moment and try again.</p>';
      return;
    }
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();

    if (!data.diagnoses || data.diagnoses.length === 0) {
      container.innerHTML = '<p class="text-[#6B7280] text-sm py-8 text-center">No diagnoses found</p>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    container.innerHTML = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b border-[#E5E7EB] bg-[#F9FAFB]"><th class="text-left p-3 font-medium">Farmer</th><th class="text-left p-3 font-medium">Crop</th><th class="text-left p-3 font-medium">Condition</th><th class="text-left p-3 font-medium">Confidence</th><th class="text-left p-3 font-medium">Status</th><th class="text-left p-3 font-medium">Urgency</th><th class="text-left p-3 font-medium">Date</th><th class="text-left p-3 font-medium"></th></tr></thead><tbody>' +
      data.diagnoses.map(d => `
        <tr class="border-b border-[#E5E7EB] hover:bg-[#F9FAFB]">
          <td class="p-3 text-[#1F2937]">${escapeHTML(d.farmer_name || d.farmer?.full_name || '-')}</td>
          <td class="p-3 text-[#1F2937] capitalize">${escapeHTML(d.crop)}</td>
          <td class="p-3 text-[#6B7280]">${escapeHTML(d.probable_condition || '-')}</td>
          <td class="p-3">${d.confidence != null ? d.confidence.toFixed(0) + '%' : '-'}</td>
          <td class="p-3"><span class="text-xs px-2 py-1 rounded-full ${d.status === 'awaiting_review' ? 'bg-yellow-50 text-yellow-700' : d.status === 'under_review' ? 'bg-blue-50 text-blue-700' : d.status === 'reviewed' ? 'bg-green-50 text-green-700' : 'bg-gray-50 text-gray-700'}">${d.status}</span></td>
          <td class="p-3"><span class="text-xs px-2 py-0.5 rounded-full ${d.urgency === 'urgent' ? 'bg-red-50 text-red-600' : d.urgency === 'high' ? 'bg-orange-50 text-orange-600' : 'bg-green-50 text-green-600'}">${d.urgency || 'unknown'}</span></td>
          <td class="p-3 text-[#6B7280] text-xs">${new Date(d.created_at).toLocaleDateString()}</td>
          <td class="p-3"><a href="/diagnoses/${d.id}" class="text-[#2E7D32] hover:underline text-xs font-medium">View</a></td>
        </tr>
      `).join('') + '</tbody></table></div>';

    const totalPages = Math.ceil(data.total / data.page_size) || 1;
    document.getElementById('pagination').innerHTML = `
      <button onclick="changePage(${currentPage - 1})" class="text-sm px-3 py-1 border rounded ${currentPage <= 1 ? 'opacity-50 cursor-not-allowed' : ''}" ${currentPage <= 1 ? 'disabled' : ''}>Previous</button>
      <span class="text-sm text-[#6B7280]">Page ${currentPage} of ${totalPages}</span>
      <button onclick="changePage(${currentPage + 1})" class="text-sm px-3 py-1 border rounded ${currentPage >= totalPages ? 'opacity-50 cursor-not-allowed' : ''}" ${currentPage >= totalPages ? 'disabled' : ''}>Next</button>
    `;
  } catch (e) {
    document.getElementById('diagnosis-list').innerHTML = '<p class="text-red-600 text-sm py-8 text-center">Failed to load diagnoses</p>';
  }
}

function changePage(page) {
  if (page < 1) return;
  currentPage = page;
  loadList();
}

function escapeHTML(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadList();
</script>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js" defer></script>
{{template "layout_foot" .}}
