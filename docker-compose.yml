services:
  app:
    build: .
    ports:
      - "8081:8081"
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: "8081"
      APP_URL: ${APP_URL:-http://localhost:8081}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/agriconnect?sslmode=disable
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_CHAT_MODEL: ${GROQ_CHAT_MODEL:-llama-3.1-8b-instant}
      GROQ_VISION_MODEL: ${GROQ_VISION_MODEL:-llama-3.2-11b-vision-preview}
      GROQ_TRANSCRIPTION_MODEL: ${GROQ_TRANSCRIPTION_MODEL:-whisper-large-v3}
      GROQ_REQUEST_TIMEOUT_SECONDS: ${GROQ_REQUEST_TIMEOUT_SECONDS:-60}
      OPEN_METEO_BASE_URL: ${OPEN_METEO_BASE_URL:-https://api.open-meteo.com/v1}
      WEATHER_CACHE_MINUTES: ${WEATHER_CACHE_MINUTES:-20}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      MAX_MESSAGE_LENGTH: ${MAX_MESSAGE_LENGTH:-4000}
      MAX_CONTEXT_MESSAGES: ${MAX_CONTEXT_MESSAGES:-12}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-20}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      LOCAL_UPLOAD_DIR: /app/data/uploads
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB:-5}
      MAX_AUDIO_SIZE_MB: ${MAX_AUDIO_SIZE_MB:-10}
      MAX_RECORDING_SECONDS: ${MAX_RECORDING_SECONDS:-60}
      DIAGNOSIS_REQUEST_TIMEOUT_SECONDS: ${DIAGNOSIS_REQUEST_TIMEOUT_SECONDS:-90}
      TRANSCRIPTION_REQUEST_TIMEOUT_SECONDS: ${TRANSCRIPTION_REQUEST_TIMEOUT_SECONDS:-90}
    volumes:
      - agriconnect_uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agriconnect
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  agriconnect_uploads:
